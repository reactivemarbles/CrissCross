name: BuildDeploy

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Release level'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

      channel:
        description: 'Release channel. none = stable RTM; alpha/beta/rc cut a pre-release.'
        required: true
        default: none
        type: choice
        options:
          - none
          - alpha
          - beta
          - rc

      sourceRef:
        description: 'Optional git ref (tag/branch/SHA) to release from. Leave blank to release from this branch.'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  id-token: write
  packages: read

env:
  configuration: Release
  solutionFile: CrissCross.slnx
  solutionFolder: src
  minMajorMinorVersion: '3.4'

jobs:
  release:
    runs-on: windows-latest
    environment:
      name: release
    outputs:
      semver2: ${{ steps.minver.outputs.NuGetPackageVersion }}
      tag: ${{ steps.tagname.outputs.tag }}
      prerelease: ${{ steps.tagname.outputs.prerelease }}
      sourceSha: ${{ steps.sourcesha.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.sourceRef }}
          fetch-depth: 0

      - name: Resolve built commit SHA
        id: sourcesha
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute release version
        id: release-version
        shell: bash
        env:
          BUMP: ${{ inputs.bump }}
          CHANNEL: ${{ inputs.channel }}
          TAG_PREFIX: v
          MINIMUM_MAJOR_MINOR: ${{ env.minMajorMinorVersion }}
        run: |
          set -euo pipefail

          case "$BUMP" in
            major|minor|patch) ;;
            *)
              echo "::error::bump must be one of major|minor|patch (got '$BUMP')."
              exit 1
              ;;
          esac

          case "$CHANNEL" in
            none) PRE_RELEASE_ID="" ;;
            alpha|beta|rc) PRE_RELEASE_ID="$CHANNEL" ;;
            *)
              echo "::error::channel must be none|alpha|beta|rc (got '$CHANNEL')."
              exit 1
              ;;
          esac

          FLOOR="${MINIMUM_MAJOR_MINOR}.0"
          LAST="$(
            git tag --list "${TAG_PREFIX}[0-9]*.[0-9]*.[0-9]*" \
              | grep -Ev -- '-' \
              | sort -V \
              | tail -1 \
              | sed "s/^${TAG_PREFIX}//" || true
          )"

          BASELINE="$FLOOR"
          if [ -n "$LAST" ]; then
            BASELINE="$(printf '%s\n%s\n' "$FLOOR" "$LAST" | sort -V | tail -1)"
          else
            echo "No RTM tag (${TAG_PREFIX}X.Y.Z) found; using MinVer floor ${FLOOR} as the release baseline."
          fi

          IFS=. read -r MAJOR MINOR PATCH <<< "$BASELINE"
          case "$BUMP" in
            major) CORE="$((MAJOR + 1)).0.0" ;;
            minor) CORE="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) CORE="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          if [ -n "$PRE_RELEASE_ID" ]; then
            MAXN=0
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue

              number="${tag##*.}"
              case "$number" in
                ''|*[!0-9]*) continue ;;
              esac

              if [ "$number" -gt "$MAXN" ]; then
                MAXN="$number"
              fi
            done < <(git tag --list "${TAG_PREFIX}${CORE}-${PRE_RELEASE_ID}.[0-9]*")

            VERSION="${CORE}-${PRE_RELEASE_ID}.$((MAXN + 1))"
            PRERELEASE=true
          else
            VERSION="$CORE"
            PRERELEASE=false
          fi

          TAG="${TAG_PREFIX}${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Tag ${TAG} already exists. Refusing to re-release an existing version."
            exit 1
          fi

          echo "Release baseline: ${TAG_PREFIX}${BASELINE} -> next (${BUMP}${PRE_RELEASE_ID:+, ${PRE_RELEASE_ID}}): ${TAG}"

          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "prerelease=${PRERELEASE}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "MINVERVERSIONOVERRIDE=${VERSION}"
            echo "MinVerVersionOverride=${VERSION}"
          } >> "$GITHUB_ENV"

      - name: Resolve release tag
        id: tagname
        shell: bash
        run: |
          {
            echo "tag=${{ steps.release-version.outputs.tag }}"
            echo "prerelease=${{ steps.release-version.outputs.prerelease }}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
            11.0.x
          dotnet-quality: 'preview'
          cache: true
          cache-dependency-path: |
            **/Directory.Packages.props
            **/*.csproj
            **/global.json
            **/nuget.config

      - name: Cache NuGet HTTP v3 feed responses
        uses: actions/cache@v6
        with:
          path: '%LOCALAPPDATA%\NuGet\v3-cache'
          key: ${{ runner.os }}-nugetv3-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj', '**/global.json', '**/nuget.config') }}
          restore-keys: |
            ${{ runner.os }}-nugetv3-

      - name: Restore .NET workloads
        shell: bash
        working-directory: ${{ env.solutionFolder }}
        run: dotnet workload restore ${{ env.solutionFile }} --from-previous-sdk --skip-manifest-update

      - name: Stamp version with MinVer
        id: minver
        uses: reactiveui/actions-common/.github/actions/minver@main
        with:
          tag-prefix: v
          minimum-major-minor: ${{ env.minMajorMinorVersion }}
          auto-increment: minor
          default-pre-release-identifiers: alpha.0
          version-override: ${{ steps.release-version.outputs.version }}

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3
        with:
          vs-prerelease: true

      - name: Build
        uses: reactiveui/actions-common/.github/actions/dotnet-build@main
        env:
          MinVerVersionOverride: ${{ steps.minver.outputs.SemVer2 }}
        with:
          configuration: ${{ env.configuration }}
          src-folder: ${{ env.solutionFolder }}
          solution-file: ${{ env.solutionFile }}
          create-packages: 'false'

      - name: Pack unsigned NuGet packages
        shell: bash
        working-directory: ${{ env.solutionFolder }}
        env:
          MinVerVersionOverride: ${{ steps.minver.outputs.SemVer2 }}
        run: dotnet pack --no-restore --configuration "${{ env.configuration }}" ${{ env.solutionFile }} -o "${GITHUB_WORKSPACE}/packages" -p:MinVerVersionOverride="${{ steps.minver.outputs.SemVer2 }}"

      - name: Upload unsigned packages
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-nuget
          path: |
            packages/*.nupkg
            !packages/*.symbols.nupkg
          if-no-files-found: error

  sign:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: read
    container:
      image: ghcr.io/reactiveui/certum-signer:latest
    env:
      CERTUM_USER_ID: ${{ secrets.CERTUM_USER_ID }}
      CERTUM_OTP_URI: ${{ secrets.CERTUM_OTP_URI }}
      CERTUM_CERT_FINGERPRINT: ${{ secrets.CERTUM_CERT_FINGERPRINT }}
    steps:
      - name: Download unsigned packages
        uses: actions/download-artifact@v8
        with:
          name: unsigned-nuget
          path: signed

      - name: Resolve prebuilt SimplySign paths
        shell: bash
        run: |
          set -euo pipefail
          : "${SS_DIST:?prebuilt image must set SS_DIST}"
          {
            echo "SS_DIST=$SS_DIST"
            echo "SS_START=$(find "$SS_DIST/" -name 'SimplySignDesktop_start' -type f | head -1)"
            echo "SS_EXE=$(find "$SS_DIST/" -name 'SimplySignDesktop' -type f | head -1)"
            echo "SS_PKCS11=$(find "$SS_DIST/" -name 'SimplySignPKCS*.so' | head -1)"
          } >> "$GITHUB_ENV"

      - name: Start headless display
        shell: bash
        run: |
          set -euo pipefail
          Xvfb :99 -screen 0 1280x1024x24 >"$RUNNER_TEMP/xvfb.log" 2>&1 &
          sleep 3
          mkdir -p "$HOME/.fluxbox"
          printf 'session.screen0.rootCommand: /bin/true\n' > "$HOME/.fluxbox/init"
          DISPLAY=:99 fluxbox >"$RUNNER_TEMP/fluxbox.log" 2>&1 &
          sleep 2
          DISPLAY=:99 xdpyinfo >/dev/null && echo "X display :99 up"

      - name: Connect SimplySign
        shell: bash
        env:
          DISPLAY: ':99'
        run: |
          set -euo pipefail
          : "${CERTUM_USER_ID:?map the CERTUM_USER_ID secret into the job env}"
          : "${CERTUM_OTP_URI:?map the CERTUM_OTP_URI secret into the job env}"

          export USER="${USER:-root}"
          cp "$SS_DIST/SimplySignDesktop.xml" "$HOME/" 2>/dev/null || true
          mkdir -p "$HOME/.config"
          {
            echo "[General]"
            echo "CacheUserIdAtLogon=Yes"
            echo "ShowLogonDialogAfterApplicationStartup=Yes"
            echo "ShowLogonDialogWhenAnyAppRequestsAccess=Yes"
          } > "$HOME/.config/Unknown Organization.conf"

          export LD_LIBRARY_PATH="$SS_DIST:${LD_LIBRARY_PATH:-}"
          if [ -n "${SS_START:-}" ]; then
            "$SS_START" >"$RUNNER_TEMP/simplysign.log" 2>&1 &
          else
            "$SS_EXE" >"$RUNNER_TEMP/simplysign.log" 2>&1 &
          fi
          sleep 20

          OTP="$(python3 -c 'import os,hmac,hashlib,base64,struct,time;from urllib.parse import urlparse,parse_qs;q=parse_qs(urlparse(os.environ["CERTUM_OTP_URI"]).query);s=q["secret"][0];digits=int(q.get("digits",["6"])[0]);period=int(q.get("period",["30"])[0]);algo={"SHA1":hashlib.sha1,"SHA256":hashlib.sha256,"SHA512":hashlib.sha512}[q.get("algorithm",["SHA1"])[0].upper()];key=base64.b32decode(s+"="*((8-len(s)%8)%8));h=hmac.new(key,struct.pack(">Q",int(time.time()//period)),algo).digest();o=h[-1]&0xF;print(str((int.from_bytes(h[o:o+4],"big")&0x7fffffff)%(10**digits)).zfill(digits))')"
          echo "::add-mask::$OTP"

          WID=""; BX=0; BY=0; BW=0; BH=0
          for attempt in $(seq 1 30); do
            best=0; WID=""
            for w in $(xdotool search --name '' 2>/dev/null); do
              nm="$(xdotool getwindowname "$w" 2>/dev/null || true)"
              case "$nm" in *implySign*) ;; *) continue ;; esac
              eval "$(xdotool getwindowgeometry --shell "$w" 2>/dev/null)"
              area=$(( ${WIDTH:-0} * ${HEIGHT:-0} ))
              if [ "$area" -gt "$best" ]; then best=$area; WID=$w; BX=${X:-0}; BY=${Y:-0}; BW=${WIDTH:-0}; BH=${HEIGHT:-0}; fi
            done
            [ "${BW:-0}" -ge 400 ] && [ "${BH:-0}" -ge 300 ] && { echo "login window $WID ${BW}x${BH} (attempt $attempt)"; break; }
            WID=""; sleep 2
          done

          [ -z "$WID" ] && { echo "::error::SimplySign login window did not appear"; cat "$RUNNER_TEMP/simplysign.log" || true; exit 1; }
          xdotool windowactivate --sync "$WID" || xdotool windowactivate "$WID" || true
          xdotool windowraise "$WID" || true
          sleep 1

          xdotool mousemove $((BX + BW/2)) $((BY + BH*39/100)) click 1; sleep 1
          xdotool type --clearmodifiers --delay 50 "$CERTUM_USER_ID"
          xdotool key Tab; sleep 1
          xdotool type --clearmodifiers --delay 50 "$OTP"
          xdotool mousemove $((BX + BW/2)) $((BY + BH*76/100)) click 1
          sleep 8

          best=0
          for w in $(xdotool search --name '' 2>/dev/null); do
            nm="$(xdotool getwindowname "$w" 2>/dev/null || true)"
            case "$nm" in *implySign*) ;; *) continue ;; esac
            eval "$(xdotool getwindowgeometry --shell "$w" 2>/dev/null)"
            area=$(( ${WIDTH:-0} * ${HEIGHT:-0} ))
            if [ "$area" -gt "$best" ]; then best=$area; WID=$w; BX=${X:-0}; BY=${Y:-0}; BW=${WIDTH:-0}; BH=${HEIGHT:-0}; fi
          done
          xdotool windowactivate --sync "$WID" || true
          xdotool mousemove $((BX + BW/2)) $((BY + BH*94/100)) click 1
          sleep 3

          timeout 60 pkcs11-tool --module "$SS_PKCS11" -L

      - name: Sign packages with jsign
        shell: bash
        run: |
          set -euo pipefail
          : "${CERTUM_CERT_FINGERPRINT:?map the CERTUM_CERT_FINGERPRINT secret into the job env}"

          JAR="${JSIGN_JAR:-$RUNNER_TEMP/jsign.jar}"
          if [ ! -s "$JAR" ]; then
            curl -fsSL -o "$JAR" "https://repo1.maven.org/maven2/net/jsign/jsign/7.4/jsign-7.4.jar"
          fi

          CONF="$RUNNER_TEMP/sunpkcs11.conf"
          {
            echo "name = SimplySign"
            echo "library = $SS_PKCS11"
            echo "slotListIndex = 0"
          } > "$CONF"

          expected_fingerprint="$(printf '%s' "$CERTUM_CERT_FINGERPRINT" | tr -d '[:space:]:')"
          if [[ ! "$expected_fingerprint" =~ ^[[:xdigit:]]{64}$ ]]; then
            echo "::error::CERTUM_CERT_FINGERPRINT must be the signer certificate SHA256 fingerprint."
            exit 1
          fi

          shopt -s nullglob
          pkgs=( signed/*.nupkg )
          [ "${#pkgs[@]}" -gt 0 ] || { echo "::error::no packages matched: signed/*.nupkg"; exit 1; }

          for pkg in "${pkgs[@]}"; do
            echo "::group::sign $pkg"
            java -jar "$JAR" --storetype PKCS11 --keystore "$CONF" --storepass "" \
              --alg SHA-256 --tsmode RFC3161 --tsaurl "http://time.certum.pl" --replace "$pkg"
            dotnet nuget verify "$pkg" --all --certificate-fingerprint "$expected_fingerprint" --verbosity detailed
            echo "::endgroup::"
          done

      - name: Upload signed packages
        uses: actions/upload-artifact@v7
        with:
          name: signed-nuget
          path: |
            signed/*.nupkg
            !signed/*.symbols.nupkg
          if-no-files-found: error

  publish-nuget:
    needs: [release, sign]
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      id-token: write
    steps:
      - name: Download signed packages
        uses: actions/download-artifact@v8
        with:
          name: signed-nuget
          path: signed

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: NuGet login (OIDC trusted publishing)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          packages=(./signed/*.nupkg)
          [ "${#packages[@]}" -gt 0 ] || { echo "::error::no publishable packages matched: ./signed/*.nupkg"; exit 1; }

          for pkg in "${packages[@]}"; do
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --skip-duplicate
          done

  create-release:
    needs: [release, publish-nuget]
    uses: reactiveui/actions-common/.github/workflows/workflow-common-create-release.yml@main
    with:
      version: ${{ needs.release.outputs.semver2 }}
      tag: ${{ needs.release.outputs.tag }}
      target: ${{ needs.release.outputs.sourceSha }}
      prerelease: ${{ needs.release.outputs.prerelease == 'true' }}
      artifactName: signed-nuget
